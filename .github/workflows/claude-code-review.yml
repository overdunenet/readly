name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            이 PR의 변경사항을 리뷰해주세요.

            리뷰 기준:
            - 버그 가능성 및 엣지케이스
            - 보안 취약점 (SQL injection, XSS 등)
            - 코드 품질 및 가독성
            - TypeScript 타입 안전성
            - 프로젝트 컨벤션 준수 여부

            기술 스택: tRPC + NestJS + TypeORM (백엔드), React + Vite + TailwindCSS (프론트엔드)

            단순 스타일 이슈는 무시하고, 실질적인 문제에 집중해주세요.
            리뷰 코멘트는 한국어로 작성해주세요.
