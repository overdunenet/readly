<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{FEATURE_NAME}} - 화면 구조도</title>
  <!-- viewport-config: { default: "{{VIEWPORT}}", overrides: {} } -->
  <style>
    /* ===== Design Tokens ===== */
    :root {
      --color-primary: #2563eb;
      --color-primary-light: #eff6ff;
      --color-bg-page: #f9fafb;
      --color-bg-card: #ffffff;
      --color-border: #e5e7eb;
      --color-text-primary: #111827;
      --color-text-secondary: #374151;
      --color-text-muted: #6b7280;
      --color-success: #16a34a;
      --color-danger: #ef4444;
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      --header-height: 56px;
      --radius-sm: 6px;
      --radius-md: 12px;
      --radius-lg: 24px;

      /* Frame Sizes */
      --phone-width: 260px;
      --phone-height: 520px;
      --desktop-width: 480px;
      --desktop-height: 320px;
    }

    /* ===== Reset & Base ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--color-bg-page);
      color: var(--color-text-primary);
      line-height: 1.5;
      padding: var(--space-xl);
    }

    /* ===== Page Header ===== */
    .page-header {
      max-width: 1400px;
      margin: 0 auto var(--space-xl);
    }
    .page-header h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: var(--space-sm);
    }
    .page-header .meta {
      font-size: 14px;
      color: var(--color-text-muted);
    }
    .page-header .meta span + span::before {
      content: ' · ';
    }

    /* ===== Screen Grid (나래비) ===== */
    .screen-grid {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-xl);
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ===== Screen Group (같은 화면의 상태들) ===== */
    .screen-group {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-lg);
      width: 100%;
    }
    .screen-group-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: var(--space-xs);
    }
    .screen-group-route {
      font-size: 13px;
      color: var(--color-text-muted);
      font-family: monospace;
      margin-bottom: var(--space-md);
    }
    .screen-group-states {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-lg);
    }

    /* ===== Screen Card ===== */
    .screen-card {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ===== State Label ===== */
    .state-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--color-text-muted);
      margin-bottom: var(--space-sm);
      text-align: center;
    }

    /* ===== Phone Frame ===== */
    .phone-frame {
      width: var(--phone-width);
      height: var(--phone-height);
      background: var(--color-bg-card);
      border-radius: var(--radius-lg);
      box-shadow: 0 4px 24px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.06);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Phone Status Bar */
    .phone-status-bar {
      height: 28px;
      background: var(--color-bg-card);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--space-md);
      font-size: 11px;
      font-weight: 600;
      color: var(--color-text-primary);
      flex-shrink: 0;
    }
    .phone-status-bar .notch {
      width: 80px;
      height: 20px;
      background: var(--color-text-primary);
      border-radius: 10px;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: 4px;
    }

    /* Phone Content */
    .phone-content {
      flex: 1;
      overflow-y: auto;
      background: var(--color-bg-page);
    }

    /* Phone Home Indicator */
    .phone-home-indicator {
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .phone-home-indicator::after {
      content: '';
      width: 100px;
      height: 4px;
      background: var(--color-text-primary);
      border-radius: 2px;
      opacity: 0.2;
    }

    /* ===== Desktop Frame ===== */
    .desktop-frame {
      width: var(--desktop-width);
      height: var(--desktop-height);
      background: var(--color-bg-card);
      border-radius: var(--radius-md);
      box-shadow: 0 4px 24px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.06);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Browser Bar */
    .browser-bar {
      height: 32px;
      background: #f3f4f6;
      display: flex;
      align-items: center;
      padding: 0 var(--space-sm);
      gap: var(--space-sm);
      border-bottom: 1px solid var(--color-border);
      flex-shrink: 0;
    }
    .browser-dots {
      display: flex;
      gap: 4px;
    }
    .browser-dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #d1d5db;
    }
    .browser-url {
      flex: 1;
      height: 20px;
      background: var(--color-bg-card);
      border-radius: 4px;
      font-size: 11px;
      color: var(--color-text-muted);
      display: flex;
      align-items: center;
      padding: 0 var(--space-sm);
    }

    /* Desktop Content */
    .desktop-content {
      flex: 1;
      overflow-y: auto;
      background: var(--color-bg-page);
    }

    /* ===== Modal Label ===== */
    .modal-label {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      color: var(--color-primary);
      background: var(--color-primary-light);
      padding: 2px 8px;
      border-radius: 4px;
      margin-bottom: var(--space-sm);
    }

    /* ===== Screen Meta ===== */
    .screen-meta {
      margin-top: var(--space-sm);
      text-align: center;
    }
    .screen-meta .screen-id {
      font-size: 11px;
      font-weight: 600;
      color: var(--color-primary);
    }
    .screen-meta .screen-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-primary);
    }

    /* ===== Common UI Components ===== */

    /* App Header */
    .app-header {
      height: var(--header-height);
      background: var(--color-bg-card);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      padding: 0 var(--space-md);
      flex-shrink: 0;
    }
    .app-header .logo {
      font-weight: 700;
      font-size: 16px;
      color: var(--color-text-primary);
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      width: 100%;
    }
    .btn-primary {
      background: var(--color-primary);
      color: white;
    }
    .btn-secondary {
      background: var(--color-bg-card);
      color: var(--color-text-secondary);
      border: 1px solid var(--color-border);
    }
    .btn-danger {
      color: var(--color-danger);
      background: transparent;
    }
    .btn-social {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: 12px var(--space-md);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      border: 1px solid var(--color-border);
      background: var(--color-bg-card);
      width: 100%;
      margin-bottom: var(--space-sm);
    }
    .btn-social .icon {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      background: var(--color-border);
    }

    /* Input */
    .input-field {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      background: var(--color-bg-card);
    }
    .input-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-secondary);
      margin-bottom: var(--space-xs);
      display: block;
    }

    /* Card */
    .card {
      background: var(--color-bg-card);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      border: 1px solid var(--color-border);
    }

    /* Badge */
    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 4px;
    }
    .badge-success { background: #dcfce7; color: var(--color-success); }
    .badge-danger { background: #fef2f2; color: var(--color-danger); }
    .badge-info { background: var(--color-primary-light); color: var(--color-primary); }
    .badge-neutral { background: #f3f4f6; color: var(--color-text-muted); }

    /* Avatar */
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #dbeafe;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      color: var(--color-primary);
      flex-shrink: 0;
    }

    /* List Item */
    .list-item {
      padding: var(--space-md);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      gap: var(--space-md);
    }

    /* Scroll Hint (fade at bottom) */
    .scroll-hint {
      height: 40px;
      background: linear-gradient(transparent, var(--color-bg-page));
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: var(--space-sm);
      font-size: 11px;
      color: var(--color-text-muted);
    }

    /* Empty State */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-xl) var(--space-md);
      color: var(--color-text-muted);
      text-align: center;
    }
    .empty-state .icon-placeholder {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #f3f4f6;
      margin-bottom: var(--space-md);
    }

    /* Error Toast */
    .error-toast {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: var(--color-danger);
      padding: var(--space-sm) var(--space-md);
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin: var(--space-sm) var(--space-md);
    }

    /* ===== Section Divider ===== */
    .section-divider {
      max-width: 1400px;
      margin: var(--space-xl) auto;
      padding-top: var(--space-xl);
      border-top: 2px solid var(--color-border);
    }
    .section-divider h2 {
      font-size: 18px;
      font-weight: 600;
      color: var(--color-text-muted);
      margin-bottom: var(--space-md);
    }

    /* ===== Utility ===== */
    .text-center { text-align: center; }
    .text-muted { color: var(--color-text-muted); }
    .text-sm { font-size: 13px; }
    .text-xs { font-size: 11px; }
    .mt-sm { margin-top: var(--space-sm); }
    .mt-md { margin-top: var(--space-md); }
    .mt-lg { margin-top: var(--space-lg); }
    .mb-sm { margin-bottom: var(--space-sm); }
    .mb-md { margin-bottom: var(--space-md); }
    .p-md { padding: var(--space-md); }
    .gap-sm { gap: var(--space-sm); }
    .flex-col { display: flex; flex-direction: column; }
    .flex-center { display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>

  <!-- ===== Page Header ===== -->
  <header class="page-header">
    <h1>{{FEATURE_ID}} {{FEATURE_NAME}} - 화면 구조도</h1>
    <div class="meta">
      <span>Feature: {{FEATURE_ID}}</span>
      <span>Milestone: {{MILESTONE}}</span>
      <span>화면 수: {{SCREEN_COUNT}}개</span>
      <span>생성일: {{DATE}}</span>
    </div>
  </header>

  <!-- ===== Common Elements ===== -->
  <div class="section-divider">
    <h2>공통 영역</h2>
  </div>
  <div class="screen-grid">
    <!--
      여기에 Header, Bottom Nav 등 공통 UI 요소를 배치합니다.
      예: App Header, Navigation 패턴 등
    -->
  </div>

  <!-- ===== Screens ===== -->
  <div class="section-divider">
    <h2>화면 목록</h2>
  </div>

  <!--
    각 화면 그룹을 아래 패턴으로 반복합니다:

    <div class="screen-group">
      <div class="screen-group-title">SCR-001: 화면명</div>
      <div class="screen-group-route">/route/path</div>
      <div class="screen-group-states">

        <div class="screen-card">
          <div class="state-label">기본</div>
          <div class="phone-frame">
            <div class="phone-status-bar">
              <span>9:41</span>
              <div class="notch"></div>
              <span>100%</span>
            </div>
            <div class="phone-content">
              여기에 화면 UI를 구성합니다
            </div>
            <div class="phone-home-indicator"></div>
          </div>
          <div class="screen-meta">
            <div class="screen-id">SCR-001</div>
            <div class="screen-name">화면명</div>
          </div>
        </div>

      </div>
    </div>
  -->

  <!-- ===== Common Patterns ===== -->
  <div class="section-divider">
    <h2>공통 패턴</h2>
  </div>
  <div class="screen-grid">
    <!--
      에러 토스트, 빈 상태, 리스트 스크롤 힌트 등
      반복 사용되는 패턴을 여기에 배치합니다.
    -->
  </div>

</body>
</html>
