# events.yml - Feature 이벤트 정의서
# Feature: 서점 시스템
# 범위: 독자향 이벤트 (작가향 데이터는 DB 트래킹)

feature: 'bookstore'
events:
  - name: 'bookstore_visited'
    trigger: '독자가 서점 페이지에 진입'
    screen_id: 'SCR-017'
    category: 'navigation'
    properties:
      - name: 'bookstore_id'
        type: 'string'
        description: '방문한 서점 ID'
      - name: 'author_id'
        type: 'string'
        description: '서점 소유 작가 ID'
      - name: 'referrer'
        type: 'string'
        description: '유입 경로 (home, search, post_detail, direct)'
      - name: 'post_count'
        type: 'number'
        description: '서점 내 공개 작품 수'
    kpi: '서점 방문 수, 작가별 방문 추이'
    funnel: 'discovery → visit → follow/purchase'

  - name: 'bookstore_post_clicked'
    trigger: '독자가 서점에서 작품(포스트) 클릭'
    screen_id: 'SCR-017, SCR-018, SCR-019'
    category: 'interaction'
    properties:
      - name: 'bookstore_id'
        type: 'string'
        description: '서점 ID'
      - name: 'post_id'
        type: 'string'
        description: '클릭한 포스트 ID'
      - name: 'post_type'
        type: 'string'
        description: '포스트 유형 (single, series_episode)'
      - name: 'section'
        type: 'string'
        description: '클릭 위치 (latest, popular, singles_tab, series_tab)'
      - name: 'position'
        type: 'number'
        description: '목록 내 위치 (0-indexed)'
    kpi: 'CTR (작품 클릭률), 섹션별 클릭 분포'
    funnel: 'visit → post_click → read/purchase'

  - name: 'bookstore_review_posted'
    trigger: '독자가 서점 리뷰/응원 글 작성 완료'
    screen_id: 'SCR-017'
    category: 'interaction'
    properties:
      - name: 'bookstore_id'
        type: 'string'
        description: '서점 ID'
      - name: 'review_length'
        type: 'number'
        description: '리뷰 글자 수'
    kpi: '서점별 리뷰 수, 리뷰 작성률'
    funnel: 'visit → review'

  - name: 'bookstore_followed'
    trigger: '독자가 서점 작가를 팔로우'
    screen_id: 'SCR-017'
    category: 'conversion'
    properties:
      - name: 'bookstore_id'
        type: 'string'
        description: '서점 ID'
      - name: 'author_id'
        type: 'string'
        description: '팔로우한 작가 ID'
      - name: 'post_count'
        type: 'number'
        description: '팔로우 시점 서점 내 공개 작품 수'
    kpi: '팔로우 전환율 (visit → follow)'
    funnel: 'visit → follow → purchase'

  - name: 'bookstore_tab_switched'
    trigger: '독자가 단편/시리즈 탭 전환'
    screen_id: 'SCR-017'
    category: 'navigation'
    properties:
      - name: 'bookstore_id'
        type: 'string'
        description: '서점 ID'
      - name: 'tab'
        type: 'string'
        description: '전환된 탭 (singles, series)'
    kpi: '탭 전환 비율, 단편 vs 시리즈 선호도'
    funnel: 'visit → tab_switch → post_click'
