version: '3'

services:
  test-postgresql:
    image: postgres:16-alpine
    container_name: test-postgresql
    ports:
      - '55432:5432'
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 2s
      timeout: 5s
      retries: 10
